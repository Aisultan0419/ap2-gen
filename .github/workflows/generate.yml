name: Generate Go Code from Protos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone Proto Files Repository
        uses: actions/checkout@v4
        with:
          repository: Aisultan0419/ap2-protos
          path: ap2-protos

      - name: Clone Generated Code Repository
        uses: actions/checkout@v4
        with:
          repository: Aisultan0419/ap2-gen
          path: ap2-gen
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Go Code from Proto Files
        run: |
          cd ap2-protos
          protoc --go_out=../ap2-gen --go_opt=paths=source_relative \
                 --go-grpc_out=../ap2-gen --go-grpc_opt=paths=source_relative \
                 payment/payment.proto order/order.proto

      - name: Tidy and Push Generated Code
        run: |
          cd ap2-gen
          go mod tidy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "auto: regenerate pb.go files"
          git push https://Aisultan0419:${{ secrets.PAT_TOKEN }}@github.com/Aisultan0419/ap2-gen.git main